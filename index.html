<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>歪なダンス</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">

  <!-- タイトル -->

  <section id="titleScreen" class="screen active">

    <img
      src="title.png"
      id="titleImage"
      alt="歪なダンス"
    >

    <div class="titleRule">
      落ちてくる矢印を<br>
      タイミングよく押せ。<br>
      サビは歪み始める。
    </div>

    <button id="startBtn">
      タップしてスタート
    </button>

  </section>

  <!-- ゲーム -->

  <section id="gameScreen" class="screen">

    <button id="backBtn">
      タイトルへ
    </button>

    <div class="hud">

      <div class="hudItem">
        SCORE
        <span id="score">0</span>
      </div>

      <div class="hudItem">
        COMBO
        <span id="combo">0</span>
      </div>

      <div class="hudItem">
        残り
        <span id="timeLeft">60</span>
      </div>

    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="danceTime">
      DANCE TIME
    </div>

    <div id="judgeText"></div>

    <div class="controls">

      <button class="tapBtn" data-lane="0">←</button>
      <button class="tapBtn" data-lane="1">↓</button>
      <button class="tapBtn" data-lane="2">↑</button>
      <button class="tapBtn" data-lane="3">→</button>

    </div>

  </section>

  <!-- 結果 -->

  <section id="resultScreen" class="screen">

    <div class="resultBox">

      <canvas id="resultCanvas"></canvas>

      <h2 id="rankText">
        イビツなダンス
      </h2>

      <div id="rankStars">
        ★★★
      </div>

      <div class="finalScore">
        SCORE
        <span id="finalScore">0</span>
      </div>

      <div class="resultButtons">

        <button id="shareBtn">
          Xでシェア
        </button>

        <button id="retryBtn">
          もう1回遊ぶ
        </button>

        <button id="homeBtn">
          カバゲーセンへ
        </button>

      </div>

    </div>

  </section>

</div>

<script src="game.js"></script>

</body>
</html>
